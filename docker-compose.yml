version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: learnflow_postgres
    environment:
      POSTGRES_USER: learnflow
      POSTGRES_PASSWORD: learnflow_secret
      POSTGRES_DB: learnflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learnflow_redis
    command: redis-server --requirepass learnflow_redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "learnflow_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: learnflow_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@learnflow.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
